<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="ponotree.css">
</head>
<body>
    <header>
        <h1>Contact Us</h1>
    </header>
    <nav>
        <a href="home.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="gallery.html">Gallery</a>
        <a href="pricing.html">Pricing</a>
        <a class="active" href="contact.html">Contact</a>
    </nav>
    <main class="container">
        <h1>Request a Service</h1>
        <p>Fill out this form and we will contact you about your tree service needs.</p>
        <div id="message"></div>
        <form id="myform">
            <fieldset>
                <legend>Service Request Details</legend>
                <div class="form-row">
                    <label for="fname">Full Name:</label>
                    <input type="text" id="fname" name="fname" required>
                </div>
                <div class="form-row">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-row">
                    <label for="phone">Phone:</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>
                <div class="form-row">
                    <label for="service">Service Needed:</label>
                    <select id="service" name="service" required>
                        <option value="">Select a service</option>
                        <option value="service1">Tree Trimming</option>
                        <option value="service2">Tree Removal</option>
                        <option value="service3">Tree Inspection</option>
                        <option value="service4">Tree Maintenance</option>
                        <option value="service5">CRB Treatment</option>
                    </select>
                </div>
                <div class="form-row">
                    <label for="details">Additional Details:</label>
                    <textarea id="details" name="details" rows="4" placeholder="Describe the job"></textarea>
                </div>
                <div class="form-row">
                    <label></label>
                    <button type="submit">Submit Request</button>
                </div>
            </fieldset>
        </form>
    </main>
    <footer>
        <p>&copy; 2026 Pono Tree Service LLC</p>
    </footer>
    <script src="form.js"></script>
</body>
</html>
